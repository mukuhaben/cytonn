<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }

    .container { max-width: 860px; margin: 0 auto; }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 0.75rem;
      align-items: end;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 0.25rem;
    }

    input, select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      font-size: 0.95rem;
      background: #f8fafc;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      background: #fff;
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary { background: #6366f1; color: #fff; }
    .btn-report { background: #0ea5e9; color: #fff; }
    .btn-advance { background: #10b981; color: #fff; }
    .btn-delete { background: #ef4444; color: #fff; }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      padding: 0.6rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .msg-success { background: #dcfce7; color: #166534; }
    .msg-error { background: #fee2e2; color: #991b1b; }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }

    th {
      text-align: left;
      padding: 0.6rem;
      background: #f8fafc;
      color: #64748b;
      font-size: 0.75rem;
      border-bottom: 2px solid #e2e8f0;
    }

    td {
      padding: 0.6rem;
      border-bottom: 1px solid #f1f5f9;
    }

    tr:hover td { background: #f8fafc; }

    .badge {
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .p-high { background: #fee2e2; color: #991b1b; }
    .p-medium { background: #fef9c3; color: #854d0e; }
    .p-low { background: #dcfce7; color: #166534; }

    .s-pending { background: #e0e7ff; color: #3730a3; }
    .s-in_progress { background: #fef3c7; color: #92400e; }
    .s-done { background: #dcfce7; color: #166534; }

    .empty {
      text-align: center;
      color: #94a3b8;
      padding: 2rem;
    }
  </style>
</head>

<body>
<div id="app" class="container">

  <h1>📋 Task Manager</h1>

  <div v-if="message.text"
       :class="['msg', message.type === 'error' ? 'msg-error' : 'msg-success']">
    {{ message.text }}
  </div>

  <div class="card">
    <h2>Create Task</h2>

    <div class="form-grid">
      <div>
        <label>Title *</label>
        <input v-model="form.title" type="text" />
        <small v-if="errors.title" style="color:red">{{ errors.title }}</small>
      </div>

      <div>
        <label>Priority *</label>
        <select v-model="form.priority">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>

      <div>
        <label>Due Date *</label>
        <input v-model="form.due_date" type="date" :min="today" />
      </div>

      <div style="display:flex; gap:0.5rem">
        <button class="btn btn-primary" @click="createTask" :disabled="loading">
          {{ loading ? '...' : 'Add' }}
        </button>
        <button class="btn" @click="resetForm">Clear</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between; margin-bottom:1rem">
      <h2>Tasks</h2>
    </div>

    <div v-if="tasks.length === 0" class="empty">No tasks yet</div>

    <table v-else>
      <thead>
        <tr>
          <th>Title</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Due</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr v-for="task in tasks" :key="task.id">
          <td style="font-weight:600">{{ task.title }}</td>

          <td>
            <span :class="['badge','p-'+task.priority]">
              {{ task.priority }}
            </span>
          </td>

          <td>
            <span :class="['badge','s-'+task.status]">
              {{ task.status.replace('_',' ') }}
            </span>
          </td>

          <td>{{ task.due_date }}</td>

          <td style="display:flex; gap:0.4rem">
            <button v-if="nextStatus(task)"
              class="btn btn-advance"
              @click="advanceStatus(task)">
              → {{ nextStatus(task) }}
            </button>

            <button v-if="task.status==='done'"
              class="btn btn-delete"
              @click="deleteTask(task)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const { createApp } = Vue

const API_BASE_URL = "https://cytonn-production.up.railway.app/api/v1";

createApp({
  data() {
    return {
      tasks: [],
      loading: false,
      message: { text: '', type: 'success' },
      errors: {},
      form: {
        title: '',
        priority: 'medium',
        due_date: ''
      }
    }
  },

  computed: {
    today() {
      return new Date().toISOString().split('T')[0]
    }
  },

  mounted() {
    this.fetchTasks()
  },

  methods: {

    async apiCall(method, endpoint, body = null) {
      this.loading = true
      this.message = { text: '', type: 'success' }
      this.errors = {}

      try {
        const res = await fetch(`${API_BASE_URL}${endpoint}`, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: body ? JSON.stringify(body) : null
        })

        const data = await res.json()

        if (!res.ok) {
          if (res.status === 422 && data.errors) {
            Object.keys(data.errors).forEach(f => {
              this.errors[f] = data.errors[f][0]
            })
          }
          this.showMessage(data.message || 'Error', 'error')
          return null
        }

        return data

      } catch (err) {
        this.showMessage('Server error', 'error')
        return null
      } finally {
        this.loading = false
      }
    },

    async fetchTasks() {
      const data = await this.apiCall('GET', '/tasks')
      if (data && data.data) this.tasks = data.data
    },

    async createTask() {
      const data = await this.apiCall('POST', '/tasks', this.form)
      if (data) {
        this.showMessage('Task created')
        this.resetForm()
        this.fetchTasks()
      }
    },

    async advanceStatus(task) {
      const next = this.nextStatus(task)
      if (!next) return

      const data = await this.apiCall(
        'PATCH',
        `/tasks/${task.id}/status`,
        { status: next }
      )

      if (data) this.fetchTasks()
    },

    async deleteTask(task) {
      if (!confirm('Delete task?')) return

      const data = await this.apiCall(
        'DELETE',
        `/tasks/${task.id}`
      )

      if (data) this.fetchTasks()
    },

    nextStatus(task) {
      const map = {
        pending: 'in_progress',
        in_progress: 'done'
      }
      return map[task.status] || null
    },

    showMessage(text, type='success') {
      this.message = { text, type }
      setTimeout(() => this.message = { text:'', type:'success' }, 3000)
    },

    resetForm() {
      this.form = { title:'', priority:'medium', due_date:'' }
      this.errors = {}
    }

  }

}).mount('#app')
</script>

</body>
</html>
